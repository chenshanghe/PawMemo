    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%logo.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #faf8f5;
        gap: 12px;
        font-family: 'Noto Serif SC', 'PingFang SC', 'Hiragino Sans GB', serif;
        -webkit-font-smoothing: antialiased;
      }
      #splash img {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(249,115,22,0.25);
      }
      #splash .name {
        font-size: 22px;
        font-weight: 700;
        color: #3d2b1e;
        letter-spacing: 0.05em;
        margin-top: 4px;
      }
      #splash .tagline {
        font-size: 13px;
        color: #a08060;
        letter-spacing: 0.02em;
      }
      #splash .dots {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      #splash .dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f97316;
        opacity: 0.3;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #splash .dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50%       { opacity: 1;   transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <img src="%BASE_URL%logo.png" alt="顽童日记" onerror="this.style.display='none'" />
        <div class="name">顽童日记</div>
        <div class="tagline">记录每一次远行的故事</div>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
