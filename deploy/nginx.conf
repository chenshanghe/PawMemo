# ─────────────────────────────────────────────────────────────────────────────
# 顽童记 Nginx 配置
# 部署路径：/etc/nginx/sites-available/wantong
# 启用：ln -sf /etc/nginx/sites-available/wantong /etc/nginx/sites-enabled/wantong
#
# SSL 申请（替换 yourdomain.com）：
#   certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL 证书（certbot 自动填充）
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_vary on;

    # 最大上传体积（照片上传）
    client_max_body_size 20m;

    # 代理到 Express（含 API + 前端静态文件）
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # 前端 JS/CSS 资源被 Vite 打成带 hash 的文件名，可长期缓存
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|webp|jpg|jpeg|svg)$ {
            proxy_pass       http://127.0.0.1:8080;
            proxy_set_header Host $host;
            expires          1y;
            add_header       Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # 健康检查端点（内部监控用）
    location /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        access_log off;
    }
}
